name: Release

# Tag-driven release: pushing `vX.Y.Z` builds binaries for every
# supported target, creates a GitHub release, and uploads the
# archives + their SHA256 sidecars. The Homebrew formula in
# `agustinvalencia/homebrew-tap` then references these URLs.
#
# Triggering: `git tag v0.1.0 && git push origin v0.1.0`.

on:
  push:
    tags:
      - 'v[0-9]+.*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Refuse tag/Cargo version drift
        # The dmg's internal CFBundleVersion comes from the workspace
        # Cargo version while asset names come from the tag — a drift
        # would ship a mislabelled app. Fail the release instead.
        run: |
          CARGO_V=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          TAG_V="${GITHUB_REF#refs/tags/v}"
          if [ "$CARGO_V" != "$TAG_V" ]; then
            echo "tag v$TAG_V does not match workspace version $CARGO_V" >&2
            exit 1
          fi

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v3
        with:
          name: v${{ steps.get_version.outputs.version }}
          draft: false
          # Tags containing a hyphen (e.g. `v0.1.0-rc1`) are treated
          # as pre-releases so they don't fight for "latest" on the
          # repo home page.
          prerelease: ${{ contains(github.ref, '-') }}
          generate_release_notes: true
          # The macOS desktop app is ad-hoc signed (no notarization, no
          # updater — that slice of M10 pulled forward for user testing).
          # Two traps the tester must be told about up front, accurately:
          # Sequoia removed the right-click -> Open Gatekeeper bypass, so
          # the reliable path is stripping quarantine; and a Finder-
          # launched app inherits no shell environment, so the vault env
          # var needs launchctl. The auto-generated PR list follows.
          body: |
            ### Desktop app (macOS) — read before first launch

            The `cuaderno-app-*.dmg` is **ad-hoc signed, not notarized**, and there
            is no auto-updater yet. Two steps to get it running:

            1. **Gatekeeper** (right-click -> Open no longer works on macOS 15+):
               after copying the app to /Applications, run
               `xattr -dr com.apple.quarantine /Applications/cuaderno.app`
               (or use System Settings -> Privacy & Security -> "Open Anyway"
               after the first blocked attempt).
            2. **Vault discovery**: a Finder-launched app inherits no shell
               environment, so set the vault path for GUI apps once per login:
               `launchctl setenv CUADERNO_VAULT_PATH "$HOME/Documents/notebook"`
               then (re)launch the app. Alternative for a one-off run:
               `CUADERNO_VAULT_PATH=... open -a cuaderno` from a terminal.
               Without it the app aborts on startup (visible in Console.app).

  build:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binaries
        # Scope to the two shipped binaries: `cdno` (cdno-cli) and
        # `cdno-mcp` (cdno-mcp). A bare `--bins` would also pull in
        # cdno-tauri, whose release build embeds `ui/dist` (gitignored,
        # absent on these runners) and needs webkit on Linux — it would
        # break this job. The desktop app is built separately in `app-dmg`.
        run: cargo build --release --target ${{ matrix.target }} -p cdno-cli -p cdno-mcp --bins
        env:
          # Cross-compiling Linux aarch64 needs the right linker.
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package
        # The archive ships both binaries plus LICENSE and README so
        # a user who downloads the tarball directly (no Homebrew)
        # gets everything they need in one folder.
        run: |
          ARCHIVE_DIR="cuaderno-${{ needs.create-release.outputs.version }}-${{ matrix.target }}"
          mkdir "$ARCHIVE_DIR"
          cp "target/${{ matrix.target }}/release/cdno" "$ARCHIVE_DIR/"
          cp "target/${{ matrix.target }}/release/cdno-mcp" "$ARCHIVE_DIR/"
          cp LICENSE "$ARCHIVE_DIR/"
          cp README.md "$ARCHIVE_DIR/"
          tar czvf "${ARCHIVE_DIR}.tar.gz" "$ARCHIVE_DIR"
          shasum -a 256 "${ARCHIVE_DIR}.tar.gz" > "${ARCHIVE_DIR}.tar.gz.sha256"

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            cuaderno-${{ needs.create-release.outputs.version }}-${{ matrix.target }}.tar.gz
            cuaderno-${{ needs.create-release.outputs.version }}-${{ matrix.target }}.tar.gz.sha256

  # Builds the macOS desktop app disk image for user testing. This
  # deliberately pulls the ad-hoc-signing slice of M10 forward: the
  # `.dmg` is ad-hoc signed with no notarization and no updater, so the
  # release notes tell users to right-click -> Open on first launch.
  # Kept a separate job (not part of the `build` matrix) because it only
  # ships aarch64, runs a Bun/Node frontend build, and must not gate the
  # CLI/MCP archives if the GUI toolchain hiccups.
  app-dmg:
    name: Build macOS app DMG
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: app-dmg

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: cd ui && bun install --frozen-lockfile

      - name: Build desktop app bundle
        # Non-standard layout: the Tauri config lives at
        # crates/cdno-tauri/tauri.conf.json and the frontend at ui/. The
        # Tauri CLI locates its project by scanning SUBFOLDERS of the cwd,
        # so it must run from the repo root (crates/cdno-tauri is a
        # subfolder) — running from ui/ fails with "couldn't recognize the
        # current folder as a Tauri project", and `--config` does not
        # override that project-root search. The CLI binary is installed
        # under ui/node_modules by the previous step. The config's
        # beforeBuildCommand runs `bun run build` in ui/ to produce
        # ui/dist before bundling.
        run: PATH="ui/node_modules/.bin:$PATH" tauri build

      - name: Rename and checksum the DMG
        # Tauri names the artifact cuaderno_<version>_aarch64.dmg; rename
        # to the release's target-triple convention and drop a sidecar.
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          SRC="$(ls target/release/bundle/dmg/*.dmg)"
          DEST="cuaderno-app-${VERSION}-aarch64-apple-darwin.dmg"
          mv "$SRC" "$DEST"
          shasum -a 256 "$DEST" > "$DEST.sha256"

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            cuaderno-app-${{ needs.create-release.outputs.version }}-aarch64-apple-darwin.dmg
            cuaderno-app-${{ needs.create-release.outputs.version }}-aarch64-apple-darwin.dmg.sha256
