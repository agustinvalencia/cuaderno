[book]
title = "Cuaderno"
description = "User guide for Cuaderno — a Research Logbook Method vault manager (CLI + MCP server)."
authors = ["Agustín Valencia"]
language = "en"
src = "src"

[output.html]
# Served as a GitHub Pages *project* site under /cuaderno/, so asset and
# cross-page links must resolve against that path prefix.
site-url = "/cuaderno/"
git-repository-url = "https://github.com/agustinvalencia/cuaderno"
edit-url-template = "https://github.com/agustinvalencia/cuaderno/edit/main/docs-site/{path}"
# Light-mode visitors get "light"; dark-mode (prefers-color-scheme: dark)
# visitors get "coal". Both are built-in mdBook themes.
default-theme = "light"
preferred-dark-theme = "coal"
no-section-label = false

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true

[output.html.fold]
enable = true
level = 1
