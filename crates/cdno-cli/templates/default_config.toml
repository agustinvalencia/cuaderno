# Cuaderno vault configuration.
#
# This file is loaded on every `cdno` invocation and from MCP/Tauri
# clients. Defaults below match the in-binary fallbacks — feel free
# to delete entries you don't need.

[vault]
name = "My Vault"
max_active_projects = 5

# ignore — glob patterns for files to keep out of the index (and so out
# of reconciliation, search, and lint). Matched against each file's
# vault-relative path: `*` stays within one path segment, `**` spans
# segments, and a bare name is anchored to the vault root (use
# `**/name.md` to match at any depth). Patterns are additive only — `!`
# negation is not supported. Empty by default; markdown is the source of
# truth, so nothing is dropped unless you list it. Meant for repo
# scaffolding that isn't a note — ignoring a real note hides it from
# search/lint/backlinks. Exclusion never deletes: the file stays on disk
# and returns once you remove the pattern and `cdno reindex`.
#
# ignore = ["CLAUDE.md", "README.md"]

# [schemas.<note-type>] — extend the built-in schema with vault-specific
# required frontmatter fields. One section per note type.
#
# [schemas.project]
# extra_required = ["owner"]

# [variables] — static template variables, expanded literally on use.
#
# [variables]
# author = "Your Name"

# [variables.prompt] — variables resolved interactively at note creation.
# The string is the prompt shown to the user.
#
# [variables.prompt]
# subject = "What is this note about?"
